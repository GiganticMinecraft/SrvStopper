name: Release
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
          cache: 'gradle'
      - uses: gradle/actions/setup-gradle@v6
      - name: Extract version
        id: version
        run: echo "version=$(grep '^version=' gradle.properties | cut -d'=' -f2)" >> "$GITHUB_OUTPUT"
      - name: Check tag does not exist
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            VERSION_LINE=$(grep -n '^version=' gradle.properties | cut -d':' -f1)
            echo "::error file=gradle.properties,line=${VERSION_LINE},title=Duplicate tag::Tag v${{ steps.version.outputs.version }} already exists"
            exit 1
          fi
      - name: Build
        run: ./gradlew build
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: build/libs/SrvStopper-${{ steps.version.outputs.version }}.jar
          generate_release_notes: true
