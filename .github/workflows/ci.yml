name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
      - run: gradle build
